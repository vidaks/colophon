name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$tag  pyproject=$ver"
          [ "$tag" = "$ver" ] || { echo "::error::tag v$tag does not match pyproject version $ver"; exit 1; }

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Extract release notes from CHANGELOG
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '
            $0 ~ ("^## \\[" v "\\]") {f=1; next}
            f && (/^## / || /^\[[^]]+\]: /) {exit}
            f {print}
          ' CHANGELOG.md > release-notes.md
          [ -s release-notes.md ] || echo "Release ${GITHUB_REF_NAME}" > release-notes.md

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md

  # --- Optional: publish to PyPI via Trusted Publishing (OIDC, no API token) ---
  # Set up a PyPI trusted publisher for project "colophon"
  # (https://docs.pypi.org/trusted-publishers/), then uncomment. NOTE: this adds the
  # third-party action pypa/gh-action-pypi-publish — review it before enabling.
