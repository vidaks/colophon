name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build — must equal the pyproject version (e.g. v0.2.0). Created at the current commit if it doesn't exist."
        required: true
        type: string

permissions:
  contents: write  # create the GitHub Release (and, on manual dispatch, the tag)

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # A tag push supplies the ref via github.ref_name; a manual run supplies it
      # as an input. Everything downstream reads $REF so both paths are identical.
      REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify the tag matches the package version
        run: |
          tag="${REF#v}"
          ver="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$tag  pyproject=$ver"
          [ "$tag" = "$ver" ] || { echo "::error::tag v$tag does not match pyproject version $ver"; exit 1; }

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Extract release notes from CHANGELOG
        run: |
          ver="${REF#v}"
          awk -v v="$ver" '
            $0 ~ ("^## \\[" v "\\]") {f=1; next}
            f && (/^## / || /^\[[^]]+\]: /) {exit}
            f {print}
          ' CHANGELOG.md > release-notes.md
          [ -s release-notes.md ] || echo "Release ${REF}" > release-notes.md

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # On a manual dispatch the tag may not exist yet — pin it to the built
          # commit so the release tags exactly what was built, not branch HEAD later.
          target=""
          [ "$GITHUB_EVENT_NAME" = workflow_dispatch ] && target="--target $GITHUB_SHA"
          gh release create "$REF" dist/* \
            --title "$REF" \
            --notes-file release-notes.md $target

  # --- Optional: publish to PyPI via Trusted Publishing (OIDC, no API token) ---
  # Set up a PyPI trusted publisher for project "colophon"
  # (https://docs.pypi.org/trusted-publishers/), then uncomment. NOTE: this adds the
  # third-party action pypa/gh-action-pypi-publish — review it before enabling.
  #
  # pypi:
  #   needs: release
  #   runs-on: ubuntu-latest
  #   environment: pypi
  #   permissions:
  #     id-token: write
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.12"
  #     - run: |
  #         python -m pip install --upgrade build
  #         python -m build
  #     - uses: pypa/gh-action-pypi-publish@release/v1
